name: house_worker
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+10

environment:
  # Flutter 3.44.0 or 3.44.1に上げると、CrashlyticsのdSYMアップロードに失敗するため、
  # Flutter 3.41.9を維持している。
  # https://github.com/invertase/flutterfire_cli/issues/428
  sdk: 3.11.5

dependencies:
  # ライブラリが Flutter SDK によって固定されているため、バージョンを指定しない
  # https://github.com/dart-lang/sdk/blob/main/docs/Flutter-Pinned-Packages.md
  characters: any
  cloud_firestore: 6.6.0
  cloud_functions: 6.3.3
  collection: 1.19.1
  cupertino_icons: 1.0.9
  device_info_plus: 13.2.0
  dio: 5.10.0
  email_validator: 3.0.0
  firebase_ai: 3.13.1
  firebase_analytics: 12.4.3
  firebase_app_check: 0.4.5
  firebase_app_installations: 0.4.2+4
  firebase_auth: 6.5.4
  firebase_core: 4.11.0
  firebase_crashlytics: 5.2.4
  firebase_remote_config: 6.5.3
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: 3.3.2
  font_awesome_flutter: 11.0.0
  freezed_annotation: 3.1.0
  google_sign_in: 7.2.0
  in_app_review: 2.0.12
  logging: 1.3.0
  mobile_scanner: 7.4.0
  package_info_plus: 10.2.1
  purchases_flutter: 10.4.3
  riverpod: 3.3.2
  riverpod_annotation: 4.0.3
  share_plus: 13.2.1
  shared_preferences: 2.5.5
  skeletonizer: 2.1.3
  url_launcher: 6.3.2

dev_dependencies:
  build_runner: 2.15.1
  cider: 0.2.10
  flutter_launcher_icons: 0.14.4
  flutter_test:
    sdk: flutter
  freezed: 3.2.5
  json_serializable: 6.13.0
  mocktail: 1.0.5
  pedantic_mono: 1.33.0
  riverpod_generator: 4.0.4
  riverpod_lint: 3.1.4
  shared_preferences_platform_interface: 2.4.2

flutter:
  uses-material-design: true
  assets:
    - assets/image/
